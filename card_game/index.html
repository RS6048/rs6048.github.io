<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻牌游戏</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        highlight: '#EF4444',
                        dark: '#1F2937',
                        light: '#F3F4F6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'flip': 'flip 0.6s ease-in-out',
                        'highlight': 'highlight 0.3s ease-in-out',
                    },
                    keyframes: {
                        flip: {
                            '0%': { transform: 'rotateY(0deg)' },
                            '50%': { transform: 'rotateY(90deg)' },
                            '100%': { transform: 'rotateY(0deg)' }
                        },
                        highlight: {
                            '0%': { boxShadow: '0 0 0 0 rgba(239, 68, 68, 0)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(239, 68, 68, 0.4)' },
                            '100%': { boxShadow: '0 0 0 20px rgba(239, 68, 68, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    

    <style type="text/tailwindcss">
        @layer utilities {
            .card-flip {
                perspective: 1000px;
            }
            .card-inner {
                transition: transform 0.6s;
                transform-style: preserve-3d;
            }
            .card-front, .card-back {
                backface-visibility: hidden;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            .card-front {
                transform: rotateY(180deg);
            }
            .flipped .card-inner {
                transform: rotateY(180deg);
            }
            .card-highlight {
                box-shadow: 0 0 0 4px theme('colors.highlight');
                z-index: 10;
            }
            .card-content {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="container mx-auto max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-dark mb-2">翻牌游戏</h1>
            <p class="text-gray-600">点击卡牌将其翻开</p>
        </header>

        <main class="mb-8">
            <!-- 卡牌区域 -->
            <div id="card-container" class="grid grid-cols-6 gap-4 mb-8">
                <!-- 卡牌将通过JavaScript动态生成 -->
            </div>

            <!-- 控制区域 -->
            <div class="flex flex-col md:flex-row items-center justify-center gap-4">
                <button id="confirm-btn" class="bg-primary hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa fa-check mr-2"></i>确认
                </button>
                <button id="customize-btn" class="bg-secondary hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105">
                    <i class="fa fa-pencil mr-2"></i>自定义卡牌
                </button>
                <button id="reset-btn" class="bg-accent hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105">
                    <i class="fa fa-refresh mr-2"></i>重置游戏
                </button>
            </div>
        </main>
    </div>

    <!-- 自定义卡牌模态框 -->
    <div id="customize-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-dark">自定义卡牌内容</h2>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="customize-grid" class="grid grid-cols-3 gap-4 mb-6">
                <!-- 自定义卡牌输入框将通过JavaScript动态生成 -->
            </div>
            <div class="flex justify-end">
                <button id="save-customization" class="bg-primary hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow transition-all duration-300">
                    保存设置
                </button>
            </div>
        </div>
    </div>

    <script>
        // 卡牌数据 - 全部使用汉字
        const cardData = [
            { id: 1, content: '一', type: 'text', color: 'text-red-500' },
            { id: 2, content: '二', type: 'text', color: 'text-blue-500' },
            { id: 3, content: '三', type: 'text', color: 'text-green-500' },
            { id: 4, content: '四', type: 'text', color: 'text-yellow-500' },
            { id: 5, content: '五', type: 'text', color: 'text-purple-500' },
            { id: 6, content: '六', type: 'text', color: 'text-pink-500' },
            { id: 7, content: '七', type: 'text', color: 'text-indigo-500' },
            { id: 8, content: '八', type: 'text', color: 'text-teal-500' },
            { id: 9, content: '九', type: 'text', color: 'text-orange-500' },
            { id: 10, content: '十', type: 'text', color: 'text-red-600' },
            { id: 11, content: '百', type: 'text', color: 'text-blue-600' },
            { id: 12, content: '千', type: 'text', color: 'text-green-600' }
        ];

        // 卡牌背面图片
        const cardBackImage = 'https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/587d8276503b4d3ca074ce62449a3cb6~tplv-a9rns2rl98-image.image?rcl=2025113021332245CA3D26F72FC8C91C89&rk3s=8e244e95&rrcfp=f06b921b&x-expires=1767101617&x-signature=YHQeKkM5yGKGF04jKTWkQ9Kwg4E%3D';
        
// 只使用文本内容

        // DOM 元素
        const cardContainer = document.getElementById('card-container');
        const confirmBtn = document.getElementById('confirm-btn');
        const customizeBtn = document.getElementById('customize-btn');
        const resetBtn = document.getElementById('reset-btn');
        const customizeModal = document.getElementById('customize-modal');
        const closeModal = document.getElementById('close-modal');
        const saveCustomization = document.getElementById('save-customization');
        const customizeGrid = document.getElementById('customize-grid');

        // 游戏状态
        let gameState = {
            cards: [...cardData],
            flippedCards: [],
            highlightedCard: null,
            isProcessing: false,
            isCustomizing: false
        };
        
        // Cookie 操作函数
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + d.toUTCString();
            document.cookie = name + "=" + JSON.stringify(value) + ";" + expires + ";path=/";
        }
        
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return JSON.parse(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        
        function deleteCookie(name) {
            setCookie(name, "", -1);
        }

        // 初始化游戏
        function initGame() {
            // 从Cookie加载卡牌设置
            const savedCards = getCookie('flipCardSettings');
            if (savedCards) {
                gameState.cards = savedCards;
                console.log('已从Cookie加载卡牌设置');
            }
            
            // 打乱卡牌顺序
            shuffleCards();
            
            // 渲染卡牌
            renderCards();
            
            // 重置游戏状态
            gameState.flippedCards = [];
            gameState.highlightedCard = null;
            gameState.isProcessing = false;
            
            // 禁用确认按钮
            confirmBtn.disabled = true;
        }

        // 打乱卡牌顺序
        function shuffleCards() {
            for (let i = gameState.cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [gameState.cards[i], gameState.cards[j]] = [gameState.cards[j], gameState.cards[i]];
            }
        }

        // 渲染卡牌
        function renderCards() {
            cardContainer.innerHTML = '';
            
            gameState.cards.forEach((card, index) => {
                const cardElement = createCardElement(card, index);
                cardContainer.appendChild(cardElement);
            });
        }

        // 创建卡牌元素
        function createCardElement(card, index) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card-flip w-full aspect-[3/4]';
            cardDiv.dataset.index = index;
            
            cardDiv.innerHTML = `
                <div class="card-inner w-full h-full relative">
                    <div class="card-back w-full h-full bg-white rounded-lg shadow-md flex items-center justify-center overflow-hidden">
                        <img src="${cardBackImage}" alt="Card Back" class="w-full h-full object-cover">
                    </div>
                    <div class="card-front w-full h-full bg-white rounded-lg shadow-md p-2">
                        <div class="card-content ${card.color}">
                            <span class="text-4xl font-bold">${card.content}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // 添加点击事件
            cardDiv.addEventListener('click', () => handleCardClick(index));
            
            return cardDiv;
        }

        // 处理卡牌点击
        function handleCardClick(index) {
            // 如果正在处理中或卡牌已翻开，则不做任何操作
            if (gameState.isProcessing || gameState.flippedCards.includes(index)) {
                return;
            }
            
            gameState.isProcessing = true;
            
            // 获取卡牌元素
            const cardElement = document.querySelector(`[data-index="${index}"]`);
            
            // 翻开所有卡牌
            flipAllCards();
            
            // 高亮当前点击的卡牌
            setTimeout(() => {
                highlightCard(index);
                gameState.isProcessing = false;
                confirmBtn.disabled = false;
            }, 300);
        }

        // 翻开所有卡牌
        function flipAllCards() {
            const allCards = document.querySelectorAll('.card-flip');
            
            allCards.forEach((card, index) => {
                // 如果卡牌尚未翻开，则翻开它
                if (!gameState.flippedCards.includes(index)) {
                    card.classList.add('flipped');
                    gameState.flippedCards.push(index);
                }
            });
        }

        // 高亮卡牌
        function highlightCard(index) {
            // 移除之前高亮的卡牌
            if (gameState.highlightedCard !== null) {
                const prevHighlighted = document.querySelector(`[data-index="${gameState.highlightedCard}"]`);
                if (prevHighlighted) {
                    prevHighlighted.classList.remove('card-highlight');
                }
            }
            
            // 高亮当前卡牌
            const cardElement = document.querySelector(`[data-index="${index}"]`);
            cardElement.classList.add('card-highlight');
            gameState.highlightedCard = index;
            
            // 添加脉冲动画
            gsap.to(cardElement, {
                boxShadow: '0 0 0 10px rgba(239, 68, 68, 0.4)',
                duration: 0.3,
                yoyo: true,
                repeat: 1
            });
        }

        // 反转所有卡牌
        function flipBackAllCards() {
            const allCards = document.querySelectorAll('.card-flip');
            
            allCards.forEach((card) => {
                card.classList.remove('flipped', 'card-highlight');
            });
            
            gameState.flippedCards = [];
            gameState.highlightedCard = null;
        }

        // 确认按钮点击事件
        confirmBtn.addEventListener('click', () => {
            if (gameState.isProcessing) return;
            
            gameState.isProcessing = true;
            
            // 使用GSAP动画反转所有卡牌
            gsap.to('.card-flip', {
                rotationY: 90,
                duration: 0.3,
                stagger: 0.05,
                onComplete: () => {
                    // 反转完成后，打乱卡牌并重新渲染
                    flipBackAllCards();
                    shuffleCards();
                    renderCards();
                    
                    // 恢复卡牌正面
                    gsap.to('.card-flip', {
                        rotationY: 0,
                        duration: 0.3,
                        stagger: 0.05,
                        onComplete: () => {
                            gameState.isProcessing = false;
                            confirmBtn.disabled = true;
                        }
                    });
                }
            });
        });

        // 重置按钮点击事件
        resetBtn.addEventListener('click', () => {
            if (gameState.isProcessing) return;
            
            gameState.isProcessing = true;
            
            // 使用GSAP动画反转所有卡牌
            gsap.to('.card-flip', {
                rotationY: 90,
                duration: 0.3,
                stagger: 0.05,
                onComplete: () => {
                    // 反转完成后，重置游戏
                    initGame();
                    
                    // 恢复卡牌正面
                    gsap.to('.card-flip', {
                        rotationY: 0,
                        duration: 0.3,
                        stagger: 0.05,
                        onComplete: () => {
                            gameState.isProcessing = false;
                        }
                    });
                }
            });
        });

        // 自定义按钮点击事件
        customizeBtn.addEventListener('click', () => {
            openCustomizeModal();
        });

        // 打开自定义模态框
        function openCustomizeModal() {
            // 生成自定义输入框
            customizeGrid.innerHTML = '';
            
            gameState.cards.forEach((card, index) => {
                const cardInput = document.createElement('div');
                cardInput.className = 'bg-white p-3 rounded-lg shadow';
                
                cardInput.innerHTML = `
                    <label class="block text-sm font-medium text-gray-700 mb-1">卡牌 ${index + 1}</label>
                    <div class="flex gap-2">
                        <input type="text" value="${card.content}" class="card-content-input flex-1 p-2 border rounded" data-index="${index}" placeholder="请输入汉字">
                        <input type="hidden" class="card-type-select" value="text" data-index="${index}">
                        <span class="px-2 py-2 bg-gray-100 rounded text-gray-500">文本</span>
                    </div>
                `;
                
                customizeGrid.appendChild(cardInput);
            });
            
            // 显示模态框
            customizeModal.classList.remove('hidden');
            gameState.isCustomizing = true;
        }

        // 关闭模态框
        closeModal.addEventListener('click', () => {
            customizeModal.classList.add('hidden');
            gameState.isCustomizing = false;
        });

        // 保存自定义设置
        saveCustomization.addEventListener('click', () => {
            const contentInputs = document.querySelectorAll('.card-content-input');
            const typeSelects = document.querySelectorAll('.card-type-select');
            
            contentInputs.forEach((input, index) => {
                // 只允许汉字输入
                let content = input.value.trim();
                
                // 验证是否为汉字
                const chineseRegex = /^[\u4e00-\u9fa5]+$/;
                if (!chineseRegex.test(content) || content === '') {
                    content = '?'; // 如果不是汉字或为空，使用问号代替
                    input.value = content; // 更新输入框显示
                }
                
                // 强制使用文本类型
                const type = 'text';
                
                // 更新卡牌数据
                gameState.cards[index].content = content;
                gameState.cards[index].type = type;
                
                // 随机分配文本颜色
                const textColors = ['text-red-500', 'text-blue-500', 'text-green-500', 'text-yellow-500', 'text-purple-500', 'text-pink-500', 'text-indigo-500', 'text-teal-500', 'text-orange-500', 'text-red-600', 'text-blue-600', 'text-green-600'];
                gameState.cards[index].color = textColors[Math.floor(Math.random() * textColors.length)];
            });
            
            // 保存卡牌设置到Cookie
            setCookie('flipCardSettings', gameState.cards, 30); // 保存30天
            console.log('卡牌设置已保存到Cookie');
            
            // 关闭模态框
            customizeModal.classList.add('hidden');
            gameState.isCustomizing = false;
            
            // 重置游戏
            initGame();
        });

        // 点击模态框背景关闭模态框
        customizeModal.addEventListener('click', (e) => {
            if (e.target === customizeModal) {
                customizeModal.classList.add('hidden');
                gameState.isCustomizing = false;
            }
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
